name: Release

# Buduje samodzielne pliki wykonywalne na Windows/macOS/Linux i dołącza je do
# wydania GitHub. Użytkownik końcowy pobiera plik dla swojego systemu i uruchamia
# go dwuklikiem — bez instalacji Pythona.
#
# Wyzwalane przez tag postaci v* (np. `git tag v0.1.0 && git push origin v0.1.0`).

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: zpl2usb-linux
          - os: windows-latest
            asset: zpl2usb-windows.exe
          - os: macos-latest
            asset: zpl2usb-macos.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Install pywin32 (Windows)
        if: runner.os == 'Windows'
        run: pip install pywin32

      - name: Build binary
        run: python packaging/build.py

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        run: cp dist/zpl2usb "${{ matrix.asset }}"

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        run: copy dist\zpl2usb.exe ${{ matrix.asset }}

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r "../${{ matrix.asset }}" zpl2usb.app

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          fail_on_unmatched_files: true
